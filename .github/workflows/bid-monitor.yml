name: Bid Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 */2 * *"

permissions:
  contents: write

concurrency:
  group: bid-monitor
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      DATA_GO_KR_SERVICE_KEY: ${{ secrets.DATA_GO_KR_SERVICE_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      CHECK_DAYS: ${{ secrets.CHECK_DAYS }}
      SEND_TELEGRAM: ${{ secrets.SEND_TELEGRAM }}
      SEND_EMPTY_SUMMARY: ${{ secrets.SEND_EMPTY_SUMMARY }}
      DOCUMENT_TIMEOUT: 8
      MAX_DOCUMENT_DOWNLOADS: 3

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Apply runtime defaults
        shell: bash
        run: |
          echo "CHECK_DAYS=${CHECK_DAYS:-3}" >> "$GITHUB_ENV"
          echo "SEND_TELEGRAM=${SEND_TELEGRAM:-true}" >> "$GITHUB_ENV"
          echo "SEND_EMPTY_SUMMARY=${SEND_EMPTY_SUMMARY:-false}" >> "$GITHUB_ENV"
          echo "DOCUMENT_TIMEOUT=${DOCUMENT_TIMEOUT:-8}" >> "$GITHUB_ENV"
          echo "MAX_DOCUMENT_DOWNLOADS=${MAX_DOCUMENT_DOWNLOADS:-3}" >> "$GITHUB_ENV"
          echo "SQLITE_PATH=data/bids.sqlite" >> "$GITHUB_ENV"

      - name: Ensure sent state file exists
        shell: bash
        run: |
          mkdir -p state
          if [ ! -f state/sent_bids.json ]; then
            printf '{\n  "sent_bid_ids": [],\n  "updated_at": null\n}\n' > state/sent_bids.json
          fi

      - name: Run bid monitor
        run: python main.py

      - name: Commit sent bid state
        run: |
          if git diff --quiet -- state/sent_bids.json; then
            echo "No sent bid state changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/sent_bids.json
          git commit -m "Update sent bid state"
          git pull --rebase
          git push
